name: Receive PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate_hugo_content:
    runs-on: ubuntu-latest
    env:
      working-directory: ./src
    name: Hugo content processing
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('**/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Hugo container image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: false
          load: true
          tags: temporary/hugo-ubuntu:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache to keep size low
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Validate code syntax (Python, JSON)
        run: |
          echo "********** Validating Python syntax"
          find . -name "*.py" -exec python3 -m py_compile {} + || exit 1
          echo "  All Python files OK"
          echo "********** Validating JSON syntax"
          FAIL=0
          for f in $(find . -name "*.json" ! -path "*/node_modules/*" ! -path "*/public/*" ! -path "*/themes/*"); do
            python3 -m json.tool "$f" > /dev/null 2>&1 || { echo "  INVALID: $f"; FAIL=1; }
          done
          if [ "$FAIL" -eq 1 ]; then echo "  JSON validation failed"; exit 1; fi
          echo "  All JSON files OK"
          echo "********** All code syntax checks passed"
        working-directory: ${{env.working-directory}}

      - name: Validate Hugo content, internal, and external web links
        run: ./make_hugo.sh -v
        working-directory: ${{env.working-directory}}

      # These steps should always run
      - name: Save PR number
        if: success() || failure()
        run: |
          mkdir -p /tmp/pr
          echo ${{ github.event.number }} > /tmp/pr/NR

      - name: Upload pr artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr
          path: /tmp/pr
