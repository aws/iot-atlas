baseURL = "https://iotatlas.net"
title = "IoT Atlas"
theme = "iot-atlas"
# English is the default language
defaultContentLanguage = "en"
# Force to have /en/my-page and /fr/my-page routes, even for default language.
defaultContentLanguageInSubdir = true
uglyurls = false
# For SEO
enableRobotsTXT = true

[params]
ordersectionsby = "weight"
editURL = "https://github.com/aws/iot-atlas/tree/main/src/hugo/content/"
themeVariant = "aws"
disableLandingPageButton = false
disableNextPrev = true
disableInlineCopyToClipBoard = true

[markup]
defaultMarkdownHandler = "goldmark"
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.highlight]
codeFences = true

[taxonomies]
tag = "tags"
category = "categories"
persona = "personae"

[outputs]
home = ["HTML", "RSS", "JSON"]

[languages]
[languages.en]
lang = "en"
langCode = "en-us"
contentDir = "content/en-us"
label = "English"
weight = 1

[languages.en.params]
editURL = "https://github.com/aws/iot-atlas/tree/main/src/hugo/content/en-us/"

[languages.zh]
lang = "zh"
langCode = "zh-cn"
contentDir = "content/zh-cn"
label = "中文(简体)"
weight = 2

[languages.zh.params]
editURL = "https://github.com/aws/iot-atlas/tree/main/src/hugo/content/zh-cn/"

[languages.fr]
lang = "fr"
langCode = "fr-fr"
contentDir = "content/fr-fr"
label = "French"
weight = 3

[languages.fr.params]
editURL = "https://github.com/aws/iot-atlas/tree/main/src/hugo/content/fr-fr/"

[languages.es]
lang = "es"
langCode = "es-es"
contentDir = "content/es-es"
label = "Español"
weight = 4

[languages.es.params]
editURL = "https://github.com/aws/iot-atlas/tree/main/src/hugo/content/es-es/"
